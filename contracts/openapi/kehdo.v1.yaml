openapi: 3.1.0
info:
  title: kehdo API
  version: 1.0.0
  description: |
    Contextual reply engine for chat screenshots.

    All endpoints return JSON. All authenticated endpoints require a Bearer JWT.
    Error responses use the universal ErrorEnvelope schema.
  contact:
    name: kehdo team
    url: https://kehdo.app
servers:
  - url: https://api.kehdo.app/v1
    description: Production
  - url: https://api.staging.kehdo.app/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local dev

tags:
  - name: auth
    description: Sign-up, sign-in, refresh
  - name: user
    description: Current user, profile, preferences
  - name: conversation
    description: Upload screenshots, list, delete
  - name: reply
    description: Generate, regenerate, refine replies
  - name: tone
    description: Available reply tones

security:
  - bearerAuth: []

paths:
  # ==================== AUTH ====================
  /auth/signup:
    post:
      operationId: signUp
      tags: [auth]
      security: []
      summary: Create a new account with email + password
      description: |
        Creates a new STARTER-tier account.

        The email must not be on the disposable-email blocklist
        (Mailinator, 10minutemail, GuerrillaMail, etc.). If it is,
        the request is rejected with `422 EMAIL_DOMAIN_NOT_ALLOWED`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/EmailDomainNotAllowed'

  /auth/login:
    post:
      operationId: signIn
      tags: [auth]
      security: []
      summary: Sign in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/google:
    post:
      operationId: signInWithGoogle
      tags: [auth]
      security: []
      summary: Sign in with a Google ID token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken: { type: string }
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      security: []
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      operationId: signOut
      tags: [auth]
      summary: Revoke the current refresh token
      responses:
        '204':
          description: Signed out

  # ==================== USER ====================
  /me:
    get:
      operationId: getCurrentUser
      tags: [user]
      summary: Get the current signed-in user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me/usage:
    get:
      operationId: getCurrentUsage
      tags: [user]
      summary: Get the current user's quota usage
      responses:
        '200':
          description: Quota state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ==================== CONVERSATIONS ====================
  /conversations:
    post:
      operationId: createConversation
      tags: [conversation]
      summary: Reserve a conversation and get a presigned upload URL
      description: |
        Creates a new conversation in `PENDING_UPLOAD` state and returns a
        short-lived presigned PUT URL. The client uploads the screenshot
        directly to object storage with `Content-Type: image/*`, then calls
        `POST /conversations/{id}/generate` to trigger OCR + reply
        generation.
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/ImageTooLarge'

    get:
      operationId: listConversations
      tags: [conversation]
      summary: List the user's conversation history
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Page of conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationPage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{id}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      operationId: getConversation
      tags: [conversation]
      summary: Get a single conversation with parsed messages
      responses:
        '200':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteConversation
      tags: [conversation]
      summary: Delete a conversation (soft delete, hard-deleted after 30 days)
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /conversations/{id}/generate:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    post:
      operationId: generateReplies
      tags: [reply]
      summary: Generate ranked reply suggestions for a conversation
      description: |
        Triggers the OCR + speaker attribution + LLM pipeline. The first call
        for a conversation transitions it from `PENDING_UPLOAD` → `PROCESSING`
        → `READY` (or `FAILED`). Subsequent calls reuse cached OCR output
        and re-run only the LLM with the new tone.

        Free-tier (`STARTER`) users may only request tones with `isPro=false`
        on `/tones`; Pro tones return `402 TONE_REQUIRES_PRO`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Replies generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/QuotaExceeded'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ConversationNotReady'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/RateLimited'

  /replies/{id}/refine:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: refineReply
      tags: [reply]
      summary: Refine a generated reply with free-text instructions
      description: |
        Applies short user instructions (e.g. "shorter", "less formal",
        "add a question") to an already-generated reply. Counts against the
        same daily quota as `generateReplies`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instructions]
              properties:
                instructions: { type: string, minLength: 1, maxLength: 200 }
      responses:
        '200':
          description: Refined reply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reply'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '402':
          $ref: '#/components/responses/QuotaExceeded'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableContent'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ==================== TONES ====================
  /tones:
    get:
      operationId: listTones
      tags: [tone]
      security: []
      summary: List all available reply tones
      description: |
        Returns the full catalog of 18 tones. Items with `isPro=true` are
        only callable by users on `PRO` or `UNLIMITED` plans; the free
        `STARTER` tier currently has access to 8 tones.
      responses:
        '200':
          description: Tones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tone'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ConversationId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  schemas:
    SignUpRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 128 }
        displayName: { type: string, maxLength: 80 }

    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn, user]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, description: Seconds until access token expires }
        user: { $ref: '#/components/schemas/User' }

    User:
      type: object
      required: [id, email, plan, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        plan:
          type: string
          enum: [STARTER, PRO, UNLIMITED]
        createdAt: { type: string, format: date-time }

    UsageResponse:
      type: object
      required: [dailyUsed, dailyLimit, resetAt]
      properties:
        dailyUsed: { type: integer }
        dailyLimit: { type: integer }
        resetAt: { type: string, format: date-time }

    CreateConversationResponse:
      type: object
      required: [conversationId, uploadUrl, uploadExpiresAt]
      properties:
        conversationId: { type: string, format: uuid }
        uploadUrl: { type: string, format: uri, description: Presigned S3 PUT URL }
        uploadExpiresAt: { type: string, format: date-time }

    Conversation:
      type: object
      required: [id, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [PENDING_UPLOAD, PROCESSING, READY, FAILED]
        messages:
          type: array
          items: { $ref: '#/components/schemas/ParsedMessage' }
        createdAt: { type: string, format: date-time }

    ParsedMessage:
      type: object
      required: [speaker, text]
      properties:
        speaker:
          type: string
          enum: [ME, THEM]
        text: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }

    ConversationPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
        nextCursor: { type: string, nullable: true }

    GenerateRequest:
      type: object
      required: [tone]
      properties:
        tone: { $ref: '#/components/schemas/ToneCode' }
        count:
          type: integer
          default: 4
          minimum: 1
          maximum: 5

    GenerateResponse:
      type: object
      required: [conversationId, tone, replies, generatedAt]
      properties:
        conversationId: { type: string, format: uuid }
        tone: { $ref: '#/components/schemas/ToneCode' }
        replies:
          type: array
          items: { $ref: '#/components/schemas/Reply' }
        generatedAt: { type: string, format: date-time }
        modelUsed: { type: string, description: 'e.g., claude-opus-4-7' }

    Reply:
      type: object
      required: [id, rank, text, toneCode]
      properties:
        id: { type: string, format: uuid }
        rank: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string, maxLength: 500 }
        toneCode: { $ref: '#/components/schemas/ToneCode' }

    Tone:
      type: object
      required: [code, name, emoji, isPro]
      properties:
        code: { $ref: '#/components/schemas/ToneCode' }
        name: { type: string }
        emoji: { type: string }
        description: { type: string }
        isPro: { type: boolean }

    ToneCode:
      type: string
      description: |
        UPPER_SNAKE_CASE tone identifier. There are 18 in total; 8 are
        available on the free `STARTER` tier. The split is exposed via
        the `isPro` flag on `GET /tones`.
      enum:
        # Free tier (8) ---------------------------------------------------
        - CASUAL
        - WARM
        - DIRECT
        - THOUGHTFUL
        - GRATEFUL
        - APOLOGETIC
        - CONFIDENT
        - BRIEF
        # Pro tier (10) ---------------------------------------------------
        - FLIRTY
        - WITTY
        - PLAYFUL
        - SARCASTIC
        - FORMAL
        - POETIC
        - EMPATHETIC
        - ENTHUSIASTIC
        - DIPLOMATIC
        - CURIOUS

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, description: UPPER_SNAKE_CASE stable identifier }
            message: { type: string, description: Human-readable, localized if Accept-Language set }
            traceId: { type: string }
            details:
              type: object
              additionalProperties: true

  responses:
    BadRequest:
      description: Validation error (`BAD_REQUEST`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Missing or invalid credentials (`UNAUTHORIZED`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource does not exist (`NOT_FOUND`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Resource conflict, e.g. email already in use (`CONFLICT`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    QuotaExceeded:
      description: |
        Daily quota exceeded (`DAILY_QUOTA_EXCEEDED`) or the requested
        tone requires a paid plan (`TONE_REQUIRES_PRO`). Both surface as
        HTTP 402; clients should distinguish via the `code` field and
        offer an upgrade CTA.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ConversationNotReady:
      description: |
        Generate or refine called before the screenshot has been uploaded
        to the presigned URL, or while OCR is still in flight
        (`CONVERSATION_NOT_READY`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    UnprocessableContent:
      description: |
        OCR or speaker attribution couldn't extract a usable conversation
        (`SCREENSHOT_INVALID` / `OCR_FAILED` / `NO_MESSAGES_DETECTED`),
        or moderation blocked the generated reply (`CONTENT_BLOCKED`).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ImageTooLarge:
      description: |
        Screenshot exceeded the maximum upload size (`IMAGE_TOO_LARGE`).
        Current limit is 10 MB.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Rate limit hit (`RATE_LIMIT_EXCEEDED`)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    EmailDomainNotAllowed:
      description: |
        Email's domain is on the disposable-email blocklist
        (e.g., Mailinator, 10minutemail). Error code is
        `EMAIL_DOMAIN_NOT_ALLOWED`. The blocked domain is exposed in
        `error.details.domain` for client-side UX.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
