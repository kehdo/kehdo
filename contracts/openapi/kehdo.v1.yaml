openapi: 3.1.0
info:
  title: kehdo API
  version: 1.0.0
  description: |
    Contextual reply engine for chat screenshots.

    All endpoints return JSON. All authenticated endpoints require a Bearer JWT.
    Error responses use the universal ErrorEnvelope schema.
  contact:
    name: kehdo team
    url: https://kehdo.app
servers:
  - url: https://api.kehdo.app/v1
    description: Production
  - url: https://api.staging.kehdo.app/v1
    description: Staging
  - url: http://localhost:8080/v1
    description: Local dev

tags:
  - name: auth
    description: Sign-up, sign-in, refresh
  - name: user
    description: Current user, profile, preferences
  - name: conversation
    description: Upload screenshots, list, delete
  - name: reply
    description: Generate, regenerate, refine replies
  - name: tone
    description: Available reply tones

security:
  - bearerAuth: []

paths:
  # ==================== AUTH ====================
  /auth/signup:
    post:
      operationId: signUp
      tags: [auth]
      security: []
      summary: Create a new account with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      operationId: signIn
      tags: [auth]
      security: []
      summary: Sign in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/google:
    post:
      operationId: signInWithGoogle
      tags: [auth]
      security: []
      summary: Sign in with a Google ID token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idToken]
              properties:
                idToken: { type: string }
      responses:
        '200':
          description: Signed in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      security: []
      summary: Exchange a refresh token for a new access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      operationId: signOut
      tags: [auth]
      summary: Revoke the current refresh token
      responses:
        '204':
          description: Signed out

  # ==================== USER ====================
  /me:
    get:
      operationId: getCurrentUser
      tags: [user]
      summary: Get the current signed-in user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /me/usage:
    get:
      operationId: getCurrentUsage
      tags: [user]
      summary: Get the current user's quota usage
      responses:
        '200':
          description: Quota state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageResponse'

  # ==================== CONVERSATIONS ====================
  /conversations:
    post:
      operationId: createConversation
      tags: [conversation]
      summary: Reserve a conversation and get a presigned upload URL
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateConversationResponse'

    get:
      operationId: listConversations
      tags: [conversation]
      summary: List the user's conversation history
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
        - name: cursor
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Page of conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationPage'

  /conversations/{id}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      operationId: getConversation
      tags: [conversation]
      summary: Get a single conversation with parsed messages
      responses:
        '200':
          description: Conversation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
    delete:
      operationId: deleteConversation
      tags: [conversation]
      summary: Delete a conversation (soft delete, hard-deleted after 30 days)
      responses:
        '204':
          description: Deleted

  /conversations/{id}/generate:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    post:
      operationId: generateReplies
      tags: [reply]
      summary: Generate ranked reply suggestions for a conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Replies generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '402':
          $ref: '#/components/responses/QuotaExceeded'
        '429':
          $ref: '#/components/responses/RateLimited'

  /replies/{id}/refine:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: refineReply
      tags: [reply]
      summary: Refine a generated reply with free-text instructions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instructions]
              properties:
                instructions: { type: string, maxLength: 200 }
      responses:
        '200':
          description: Refined reply
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reply'

  # ==================== TONES ====================
  /tones:
    get:
      operationId: listTones
      tags: [tone]
      security: []
      summary: List all available reply tones
      responses:
        '200':
          description: Tones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tone'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ConversationId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  schemas:
    SignUpRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 128 }
        displayName: { type: string, maxLength: 80 }

    SignInRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn, user]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer, description: Seconds until access token expires }
        user: { $ref: '#/components/schemas/User' }

    User:
      type: object
      required: [id, email, plan, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        plan:
          type: string
          enum: [STARTER, PRO, UNLIMITED]
        createdAt: { type: string, format: date-time }

    UsageResponse:
      type: object
      required: [dailyUsed, dailyLimit, resetAt]
      properties:
        dailyUsed: { type: integer }
        dailyLimit: { type: integer }
        resetAt: { type: string, format: date-time }

    CreateConversationResponse:
      type: object
      required: [conversationId, uploadUrl, uploadExpiresAt]
      properties:
        conversationId: { type: string, format: uuid }
        uploadUrl: { type: string, format: uri, description: Presigned S3 PUT URL }
        uploadExpiresAt: { type: string, format: date-time }

    Conversation:
      type: object
      required: [id, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        status:
          type: string
          enum: [PENDING_UPLOAD, PROCESSING, READY, FAILED]
        messages:
          type: array
          items: { $ref: '#/components/schemas/ParsedMessage' }
        createdAt: { type: string, format: date-time }

    ParsedMessage:
      type: object
      required: [speaker, text]
      properties:
        speaker:
          type: string
          enum: [ME, THEM]
        text: { type: string }
        confidence: { type: number, minimum: 0, maximum: 1 }

    ConversationPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/Conversation' }
        nextCursor: { type: string, nullable: true }

    GenerateRequest:
      type: object
      required: [tone]
      properties:
        tone: { $ref: '#/components/schemas/ToneCode' }
        count:
          type: integer
          default: 4
          minimum: 1
          maximum: 5

    GenerateResponse:
      type: object
      required: [conversationId, tone, replies, generatedAt]
      properties:
        conversationId: { type: string, format: uuid }
        tone: { $ref: '#/components/schemas/ToneCode' }
        replies:
          type: array
          items: { $ref: '#/components/schemas/Reply' }
        generatedAt: { type: string, format: date-time }
        modelUsed: { type: string, description: 'e.g., claude-opus-4-7' }

    Reply:
      type: object
      required: [id, rank, text, toneCode]
      properties:
        id: { type: string, format: uuid }
        rank: { type: integer, minimum: 1, maximum: 5 }
        text: { type: string, maxLength: 500 }
        toneCode: { $ref: '#/components/schemas/ToneCode' }

    Tone:
      type: object
      required: [code, name, emoji, isPro]
      properties:
        code: { $ref: '#/components/schemas/ToneCode' }
        name: { type: string }
        emoji: { type: string }
        description: { type: string }
        isPro: { type: boolean }

    ToneCode:
      type: string
      enum:
        - CASUAL
        - FLIRTY
        - WITTY
        - FORMAL
        - SARCASTIC
        - POETIC
        - GRATEFUL
        - THOUGHTFUL
        - DIRECT
        - WARM
        - CONFIDENT
        - PLAYFUL

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, description: UPPER_SNAKE_CASE stable identifier }
            message: { type: string, description: Human-readable, localized if Accept-Language set }
            traceId: { type: string }
            details:
              type: object
              additionalProperties: true

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Resource conflict (e.g., email already in use)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    QuotaExceeded:
      description: Daily quota exceeded — upgrade required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Rate limit hit
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
