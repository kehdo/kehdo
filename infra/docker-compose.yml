version: '3.9'

# ============================================================
# kehdo local development — docker-compose
# ============================================================
# Run from repo root:  docker compose -f infra/docker-compose.yml up -d
# Or via:               ./tools/bootstrap.sh
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: kehdo-postgres
    environment:
      POSTGRES_USER: kehdo
      POSTGRES_PASSWORD: kehdo
      POSTGRES_DB: kehdo
    ports:
      - "5432:5432"
    volumes:
      - kehdo_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kehdo"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kehdo-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: kehdo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - kehdo_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: seed MinIO with the bucket on first run
  minio-init:
    image: minio/mc:latest
    container_name: kehdo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/kehdo-screenshots-dev || true;
      mc anonymous set download local/kehdo-screenshots-dev || true;
      echo 'MinIO seeded';
      "

volumes:
  kehdo_pg_data:
  kehdo_minio_data:
