spring:
  application:
    name: kehdo-backend
    version: 0.0.1-SNAPSHOT
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kehdo}
    username: ${SPRING_DATASOURCE_USERNAME:kehdo}
    password: ${SPRING_DATASOURCE_PASSWORD:kehdo}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema, never Hibernate
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: framework
  servlet:
    context-path: /v1   # All endpoints live under /v1, matching api.kehdo.app/v1/*
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: ${spring.application.name}
      environment: ${SPRING_PROFILES_ACTIVE:local}

# kehdo-specific config
kehdo:
  jwt:
    issuer: https://api.kehdo.app
    access-token-ttl-seconds: 300        # 5 minutes
    refresh-token-ttl-days: 30
    public-key-path: ${KEHDO_JWT_PUBLIC_KEY_PATH:classpath:keys/jwt-public.pem}
    private-key-path: ${KEHDO_JWT_PRIVATE_KEY_PATH:classpath:keys/jwt-private.pem}

  storage:
    s3:
      endpoint: ${KEHDO_S3_ENDPOINT:http://localhost:9000}
      bucket: ${KEHDO_S3_BUCKET:kehdo-screenshots-dev}
      access-key: ${KEHDO_S3_ACCESS_KEY:minioadmin}
      secret-key: ${KEHDO_S3_SECRET_KEY:minioadmin}
      presigned-url-ttl-minutes: 5

  rate-limit:
    free-daily-replies: 5
    pro-daily-replies: 100
    rps-per-user: 10

  # AI providers — Phase 1 stack per ADR 0006:
  # Vertex AI (primary) + OpenAI (failover) + Google Cloud Vision (OCR)
  ai:
    # Hard cap on prompt tokens per backend/CLAUDE.md AI rule 3.
    token-budget: 3000
    vertex:
      project-id: ${VERTEX_PROJECT_ID:}
      location: ${VERTEX_LOCATION:asia-south1}
      model: ${VERTEX_MODEL:gemini-2.0-flash}
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}
      role: primary
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-4o-mini}
      role: failover
    google-vision:
      credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS:}

# Resilience4j — gate around every external AI call per backend/CLAUDE.md
# AI rule 4. Phase 4 PR 7+ wires Vertex AI / OpenAI / Cloud Vision behind
# these named instances; the stub adapters in PR 3 don't trip them.
resilience4j:
  circuitbreaker:
    instances:
      llm-vertex:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      llm-openai:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      ocr-vision:
        sliding-window-size: 50
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
      moderation:
        sliding-window-size: 50
        failure-rate-threshold: 70   # moderation is best-effort; tolerate more drift
        wait-duration-in-open-state: 60s
  timelimiter:
    instances:
      llm-vertex: { timeout-duration: 10s }
      llm-openai: { timeout-duration: 10s }
      ocr-vision: { timeout-duration: 8s }
      moderation: { timeout-duration: 5s }
  retry:
    instances:
      llm-vertex: { max-attempts: 2, wait-duration: 250ms }
      llm-openai: { max-attempts: 2, wait-duration: 250ms }
      ocr-vision: { max-attempts: 2, wait-duration: 250ms }

logging:
  level:
    root: INFO
    app.kehdo: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{traceId:-}] %logger{40} - %msg%n'
